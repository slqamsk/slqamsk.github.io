<!DOCTYPE html>
<html>
<head>
    <title>Simple API Emulator</title>
</head>
<body>
    <script>
        // Данные для эмуляции
        let products = [
            { id: 1, name: "Ноутбук", price: 1000 },
            { id: 2, name: "Мышь", price: 20 },
            { id: 3, name: "Клавиатура", price: 50 }
        ];
        let nextId = 4;

        // Перехват fetch
        const originalFetch = window.fetch;
        window.fetch = async function(url, options = {}) {
            const path = new URL(url, window.location.origin).pathname;
            const method = options.method || 'GET';
            let body = null;
            
            if (options.body) {
                try {
                    body = JSON.parse(options.body);
                } catch (e) {
                    return new Response(JSON.stringify({ error: "Invalid JSON" }), {
                        status: 400,
                        headers: { 'Content-Type': 'application/json' }
                    });
                }
            }

            // GET / - список эндпоинтов
            if (path === '/' && method === 'GET') {
                return new Response(JSON.stringify({
                    endpoints: ["/products/", "/products/:id", "POST /products/"]
                }), {
                    status: 200,
                    headers: { 'Content-Type': 'application/json' }
                });
            }

            // GET /products/
            if (path === '/products/' && method === 'GET') {
                return new Response(JSON.stringify(products), {
                    status: 200,
                    headers: { 'Content-Type': 'application/json' }
                });
            }

            // GET /products/:id
            const matchId = path.match(/^\/products\/(\d+)$/);
            if (matchId && method === 'GET') {
                const id = parseInt(matchId[1]);
                
                if (id === 2) {
                    return new Response(JSON.stringify({ error: "Not found" }), {
                        status: 404,
                        headers: { 'Content-Type': 'application/json' }
                    });
                }
                
                const product = products.find(p => p.id === id);
                if (product) {
                    return new Response(JSON.stringify(product), {
                        status: 200,
                        headers: { 'Content-Type': 'application/json' }
                    });
                } else {
                    return new Response(JSON.stringify({ error: "Product not found" }), {
                        status: 404,
                        headers: { 'Content-Type': 'application/json' }
                    });
                }
            }

            // POST /products/
            if (path === '/products/' && method === 'POST') {
                if (!body || !body.name || !body.price) {
                    return new Response(JSON.stringify({ error: "Missing name or price" }), {
                        status: 400,
                        headers: { 'Content-Type': 'application/json' }
                    });
                }
                
                const newProduct = {
                    id: nextId++,
                    name: body.name,
                    price: body.price
                };
                products.push(newProduct);
                
                return new Response(JSON.stringify({ 
                    message: "Product created (simulated)", 
                    product: newProduct 
                }), {
                    status: 201,
                    headers: { 'Content-Type': 'application/json' }
                });
            }

            // 404 для всего остального
            return new Response(JSON.stringify({ error: "Not found" }), {
                status: 404,
                headers: { 'Content-Type': 'application/json' }
            });
        };

        console.log('API Emulator active');
        console.log('GET /');
        console.log('GET /products/');
        console.log('GET /products/1');
        console.log('GET /products/2 (404)');
        console.log('POST /products/');
    </script>
</body>
</html>
