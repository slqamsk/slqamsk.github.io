## ЭПОХА 1. ДОТЕХНОЛОГИЧЕСКАЯ ЭПОХА
### *Биологическое наследие*
### (≈200 млн — 2.6 млн лет назад)

---

### ОБЩАЯ ХАРАКТЕРИСТИКА

**Хронологические рамки:** от ≈200 млн до ≈2.6 млн лет назад.

**Геологические эпохи:** Мезозой (конец) — Кайнозой — Плиоцен (конец).

**Ключевой признак:** Отсутствие технологий в строгом смысле слова.

Вся эпоха проходит до появления понимания причинно-следственной связи в человеческом смысле и до первого намеренного производства орудий. Все механизмы, навыки и формы поведения являются биологическим наследием — они унаследованы от животных предков и не были изобретены человеком.

**Что отсутствует:**
- Намеренное изменение формы предметов (производство орудий).
- Понимание связи «действие → отдалённый результат».
- Культурная передача сложных навыков (только показ и имитация).
- Осознанные социальные правила (только инстинкты и простые поведенческие нормы).

**Что присутствует:**
- Использование готовых природных предметов (камни, палки).
- Простые формы социальной организации.
- Базовые когнитивные механизмы (память, сигнальная коммуникация, импринтинг, обучение показом).

**Скорость изменений:** Эволюционная. Новые формы поведения закрепляются генетически, через естественный отбор. На это уходят миллионы лет.

**Гоминины, действовавшие в эту эпоху:**
- *Sahelanthropus tchadensis* — сахелантроп чадский.
- *Orrorin tugenensis* — оррорин тугенский.
- *Australopithecus afarensis* — австралопитек афарский.

---

### ХАРАКТЕРИСТИКА КЛИМАТА

| Период | Климат |
|:---|:---|
| **Юрский период** (≈200–145 млн лет назад) | Тёплый, влажный. Высокий уровень CO₂. Тропические леса покрывают большую часть суши. Ранние млекопитающие — мелкие, ночные, насекомоядные. |
| **Меловой период** (≈145–66 млн лет назад) | Продолжение тёплого климата. В конце — падение астероида, вымирание динозавров. Выживание мелких млекопитающих. |
| **Палеоген** (≈66–23 млн лет назад) | Тёплый «парниковый» климат. Расцвет млекопитающих. Появление приматов. К концу — постепенное похолодание. |
| **Неоген** (≈23–2.6 млн лет назад) | Прогрессирующее похолодание и иссушение. Сокращение лесов, расширение саванн. В плиоцене — появление первых гоминин. |
| **Конец плиоцена** (≈2.6 млн лет назад) | Начало четвертичного оледенения. Циклические похолодания и потепления. Расширение саванн в Африке — ключевой фактор эволюции ранних *Homo*. |

**Влияние климата на гоминин:**
- Сокращение лесов и расширение саванн способствовало переходу к прямохождению (лучший обзор в высокой траве) и изменению диеты (больше мяса и кореньев).
- Сезонность ресурсов стимулировала развитие памяти на места.
- Похолодание в конце плиоцена совпадает с появлением первых каменных орудий (Эпоха 2).

### ХРОНОЛОГИЧЕСКИЙ СПИСОК

**1. Запоминание хороших мест** (≈200 млн лет назад)
   *Тип:* Когнитивный механизм.
   *Суть:* Способность запоминать и возвращаться к местам с водой, пищей, безопасным укрытием. Основа эффективного собирательства и сезонных миграций.
   *Вид:* Млекопитающие.
   *Датировка:* Развитие гиппокампа у ранних млекопитающих. Наблюдается у всех современных млекопитающих: волки помнят логова и водопои, слоны — маршруты к воде в засуху, белки — места закопанных орехов.

**2. Сигнальная коммуникация** (≈200 млн лет назад)
   *Тип:* Биологический механизм + простая вокализация.
   *Суть:* Издавание и распознавание криков, обозначающих опасность, пищу, угрозу, брачные сигналы. Без грамматики, без возможности описать прошлое или будущее.
   *Вид:* Млекопитающие.
   *Датировка:* Структуры среднего мозга и лимбической системы, общие для млекопитающих. Наблюдается у сурикатов (разные крики для наземной и воздушной опасности), луговых собачек (сложная система сигналов), дельфинов (индивидуальные позывные).

**3. Импринтинг (эффект Вестермарка)** (≈200 млн лет назад)
   *Тип:* Биологический механизм.
   *Суть:* Отсутствие полового влечения к особям, с которыми рос в раннем детстве. Биологическая основа для избегания близкородственного скрещивания.
   *Вид:* Млекопитающие.
   *Датировка:* Поведенческие эксперименты на грызунах, приматах, копытных. Наблюдается у львов (самки избегают спаривания с самцами своего прайда, если те присутствовали при их взрослении), волков (размножается только альфа-пара), лошадей (кобылы не кроются своими отцами).

**4. Обучение показом (имитация)** (≈65 млн лет назад)
   *Тип:* Когнитивный механизм.
   *Суть:* Способность учиться, наблюдая за действиями сородичей и повторяя их. Единственный способ передачи навыков в эту эпоху.
   *Вид:* Приматы.
   *Датировка:* Наличие зеркальных нейронов у приматов. Наблюдается у шимпанзе (молодые учатся колоть орехи, наблюдая за матерью), макак (мытьё батата распространилось через наблюдение).

**5. Эпизодическая забота о слабых** (≈6–8 млн лет назад)
   *Тип:* Поведенческая норма.
   *Суть:* Отдельные случаи помощи раненым, больным или старым сородичам — кормление, поддержка при передвижении, защита от хищников. Ещё не система, но уже регулярное явление.
   *Вид:* Общие предки человека и шимпанзе.
   *Датировка:* Зафиксировано у шимпанзе (уход за парализованными или ослепшими особями), слонов (помогают раненому встать), дельфинов (подталкивают ослабшего к поверхности).

**6. Примитивная охота группой** (≈6–8 млн лет назад)
   *Тип:* Социальная технология.
   *Суть:* Окружение и преследование добычи группой, без специализированного оружия, без сложной координации и разделения ролей.
   *Вид:* Общие предки человека и шимпанзе.
   *Датировка:* Наблюдается у шимпанзе (групповая охота на колобусов), львов (координация загона), волков (преследование и окружение), гиеновых собак, косаток.

**7. Разделение труда (половое)** (≈6–8 млн лет назад)
   *Тип:* Социальная технология.
   *Суть:* Базовое разделение ролей: самцы преимущественно охотятся и защищают, самки — заботятся о потомстве и собирают растительную пищу.
   *Вид:* Общие предки человека и шимпанзе.
   *Датировка:* Наблюдается у шимпанзе (самцы охотятся чаще самок), львов (львицы охотятся, самцы защищают прайд).

**8. Гнездо / настил (идея укрытия)** (≈6–8 млн лет назад)
   *Тип:* Пространственная технология.
   *Суть:* Сооружение из веток и листвы для ночлега, отдыха, защиты от хищников и непогоды. Часто на деревьях, иногда на земле.
   *Вид:* Общие предки человека и шимпанзе.
   *Датировка:* Наблюдается у всех современных человекообразных обезьян: шимпанзе (ежедневно строят новые гнёзда), горилл (наземные гнёзда), орангутанов (гнёзда в кронах).

**9. Прямохождение (бипедализм)** (≈7 млн лет назад)
   *Тип:* Анатомическая адаптация.
   *Суть:* Передвижение на двух нижних конечностях. Освобождение верхних конечностей для манипуляций, переноски предметов, пищи, детёнышей.
   *Вид:* *Sahelanthropus tchadensis* / *Orrorin tugenensis*.
   *Датировка:* Строение бедренной кости *Orrorin* (≈6 млн лет); положение затылочного отверстия *Sahelanthropus* (≈7 млн лет).

**10. Трудовая кисть** (≈6 млн лет назад)
   *Тип:* Анатомическая адаптация.
   *Суть:* Укорочение пальцев, удлинение и усиление большого пальца, способность к силовому и точному захвату. Основа для изготовления и использования орудий.
   *Вид:* Ранние гоминины → *Australopithecus*.
   *Датировка:* Кости кисти *Ardipithecus ramidus* (≈4.4 млн лет); дальнейшее развитие у *Australopithecus afarensis*.

**11. Острые камни** (≈3.3 млн лет назад)
   *Тип:* Использование природных предметов.
   *Суть:* Использование естественных острых осколков камня (без обработки) для разбивания костей и доступа к костному мозгу.
   *Вид:* *Australopithecus afarensis*.
   *Датировка:* Слой Ломекви 3, Кения — кости с порезами и следами ударов.

**12. Палка-копалка** (≈3 млн лет назад)
   *Тип:* Использование природных предметов с минимальной модификацией.
   *Суть:* Заострённая (зубами или трением о камень) деревянная палка для выкапывания корней, клубней, личинок.
   *Вид:* *Australopithecus* / ранний *Homo*.
   *Датировка:* Косвенная — износ зубов от фитолитов. Шимпанзе используют палки для термитов, но не для копания корней.

### ПРЕДПОСЫЛКИ ДЛЯ РОСТА МОЗГА В ЭПОХЕ 2

Эпоха 1 заложила фундамент для последующего увеличения объёма мозга:

- **Прямохождение** освободило руки для переноски пищи и орудий.
- **Трудовая кисть** позволила точнее манипулировать предметами.
- **Острые камни** дали доступ к **костному мозгу** — высококалорийному источнику пищи.
- **Палка-копалка** расширила спектр растительной пищи (подземные клубни).
- **Примитивная охота группой** и **разделение труда** повысили эффективность добычи мяса.

Всё это создало **энергетический избыток**, который в Эпохе 2 позволил естественному отбору поддерживать рост мозга — органа, потребляющего до 20% всей энергии тела. Первый скачок произойдёт у *Homo habilis* (≈2.4 млн лет назад), второй — у *Homo erectus* (≈1.9 млн лет назад).

---

### КОНЕЦ ЭПОХИ 1

На рубеже ≈2.6 млн лет назад Дотехнологическая эпоха завершается. Ей на смену приходит **Эпоха 2 — Нижний палеолит**, которая начинается с появления **понимания причинно-следственной связи** и **первого намеренного производства орудий** (чопперы).
