<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Редактор рангов и категорий</title>
  <style>
    /* Убраны глобальные цвета, чтобы не перебивать contrast-color */
    :root { --bg-page: #f4f6f8; --panel-bg: #ffffff; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-page); padding: 20px; margin: 0; }
    h2 { margin: 0 0 10px; font-size: 22px; }
    
    textarea { width: 100%; height: 260px; font-family: 'Courier New', monospace; font-size: 13px; padding: 10px; border: 1px solid #c9d1d9; border-radius: 6px; background: #0d1117; color: #e6edf3; }
    button { background: #2563eb; color: white; border: none; padding: 10px 18px; font-size: 14px; border-radius: 6px; cursor: pointer; margin: 12px 0; }
    button:hover { background: #1d4ed8; }
    
    table.main-table { width: auto; margin: 0 auto; border-collapse: collapse; background: var(--panel-bg); margin-top: 10px; font-size: 13px; border: 2px solid #000; }
    th.main-th, td.main-td { border: 1px solid #000; padding: 0; vertical-align: top; }
    th.main-th { background: #e5e7eb; padding: 8px 12px; text-align: left; border-bottom: 2px solid #000; }

    .cell { padding: 6px 10px; min-height: 40px; display: flex; flex-direction: column; justify-content: center; gap: 2px; cursor: pointer; transition: filter 0.2s; white-space: nowrap; }
    .cell:hover { filter: brightness(0.95); }
    .info-title { font-weight: 600; font-size: 13px; }
    .info-colors { font-size: 11px; opacity: 0.85; }

    .status { padding: 8px; border-radius: 6px; margin: 10px 0; display: none; font-size: 13px; }
    .status.success { background: #d1fae5; color: #065f46; }
    .status.error { background: #fee2e2; color: #991b1b; }

    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    #modal-overlay.active { opacity: 1; pointer-events: auto; }
    #color-picker-modal { background: var(--panel-bg); padding: 16px; border-radius: 8px; width: 90%; max-width: 750px; max-height: 85vh; display: flex; flex-direction: column; }
    #color-picker-modal h3 { margin: 0 0 10px; font-size: 16px; font-weight: 600; }
    #close-modal { background: #ef4444; color: white; border: none; padding: 4px 10px; font-size: 12px; margin: 0 0 8px auto; border-radius: 4px; cursor: pointer; }
    #palette-container { overflow-y: auto; padding: 2px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 12px; }

    .palette-table { width: auto; margin: 0 auto; border-collapse: collapse; font-size: 12px; background: #fff; border: 2px solid #000; }
    .palette-table th { background: #f8f9fa; padding: 4px 8px; border: 1px solid #000; text-align: left; white-space: nowrap; }
    .palette-table td { padding: 1px 6px; border: 1px solid #000; cursor: pointer; white-space: nowrap; line-height: 1.2; vertical-align: middle; }
    .palette-table tr:hover td { filter: brightness(0.92); }

    .group-header { background-color: #f8f9fa; padding-top: 14px; padding-bottom: 4px; text-align: left; vertical-align: bottom; cursor: default; }
    .group-header:hover td { filter: none; }

    .credit-line { font-size: 10px; color: #6b7280; text-align: center; margin-top: 8px; line-height: 1.4; }
    .credit-line a { color: #2563eb; text-decoration: none; }

    /* Единственное правило, задающее цвет текста на динамических фонах */
    td.main-td, .cell, .palette-table td {
      color: contrast-color(var(--bg));
    }
  </style>
</head>
<body>

  <textarea id="json-input" placeholder="Вставьте time-tracker-categories.json..."></textarea>
  <br>
  <button id="apply-btn">Применить</button>
  <div id="status-box" class="status"></div>

  <table class="main-table" id="result-table">

    <tbody id="table-body"></tbody>

    function init() {
      buildPalette();
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          appData = JSON.parse(stored);
          document.getElementById('json-input').value = JSON.stringify(appData, null, 2);
          renderTable();
          showStatus('Данные загружены из LocalStorage', 'success');
        } catch(e) { showStatus('Ошибка в сохранённых данных. Очищаю кэш.', 'error'); localStorage.removeItem(STORAGE_KEY); }
      }
    }

    function buildPalette() {
      const container = document.getElementById('palette-container');
      container.innerHTML = '';
      const table = document.createElement('table');
      table.className = 'palette-table';
      
      const thead = document.createElement('thead');
      thead.innerHTML = `<tr><th>Название</th><th>Name</th><th>HEX</th></tr>`;
      table.appendChild(thead);
      
      const tbody = document.createElement('tbody');
      PALETTE_GROUPS.forEach(group => {
        const trHeader = document.createElement('tr');
        trHeader.innerHTML = `<td colspan="3" class="group-header">${group.header}</td>`;
        tbody.appendChild(trHeader);

        group.colors.forEach(c => {
          const tr = document.createElement('tr');
          tr.style.backgroundColor = c.name;
          tr.style.setProperty('--bg', c.name);
          tr.onclick = () => applyColor(c.name);
          tr.innerHTML = `<td>${c.ru}</td><td>${c.name}</td><td style="font-family:monospace; text-align:center">${c.hex}</td>`;
          tbody.appendChild(tr);
        });
      });
      table.appendChild(tbody);
      container.appendChild(table);
      
      const credit = document.createElement('div');
      credit.className = 'credit-line';
      credit.innerHTML = 'Сделано нейросетью Qwen3.6-Plus по запросу <a href="https://slqamsk.github.io/" target="_blank">Сергея Слесарева</a> на основе страницы <a href="https://findh.org/5060-konverter-tsvetov.html" target="_blank">https://findh.org/5060-konverter-tsvetov.html</a>';
      container.appendChild(credit);
    }

    function openModal(path) {
      activePath = path;
      document.getElementById('modal-overlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
      activePath = null;
    }

    document.getElementById('close-modal').onclick = closeModal;
    document.getElementById('modal-overlay').onclick = (e) => { if(e.target.id === 'modal-overlay') closeModal(); };

    function setNested(obj, path, value) {
      const keys = path.split('.');
      let curr = obj;
      for(let i=0; i<keys.length-1; i++) curr = curr[keys[i]];
      curr[keys[keys.length-1]] = value;
    }

    function getColorInfo(value) {
      if (!value) return { name: 'White', ru: 'Белый', hex: '#FFFFFF' };
      const searchVal = value.toLowerCase();
      for(const g of PALETTE_GROUPS) {
        const found = g.colors.find(c => c.name.toLowerCase() === searchVal);
        if(found) return { name: found.name, ru: found.ru, hex: found.hex };
      }
      return { name: value, ru: value, hex: '#FFFFFF' };
    }

    function applyColor(name) {
      if (!activePath || !appData) return;
      setNested(appData, activePath, name);
      document.getElementById('json-input').value = JSON.stringify(appData, null, 2);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
      
      const td = document.querySelector(`[data-path="${activePath}"]`);
      if(td) {
        const info = getColorInfo(name);
        td.style.backgroundColor = info.name;
        td.style.setProperty('--bg', info.name);
        td.querySelector('.en').textContent = info.name;
        td.querySelector('.ru').textContent = info.ru;
      }
      showStatus(`Цвет ${name} применён и сохранён`, 'success');
      closeModal();
    }

    function renderTable() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      if(!appData?.ranks) return showStatus('Не найден массив "ranks"', 'error');

      appData.ranks.forEach((rank, rIdx) => {
        const cats = rank.categories || [];
        const rankValue = rank.color || 'White';
        const rankInfo = getColorInfo(rankValue);
        
        cats.forEach((cat, cIdx) => {
          const tr = document.createElement('tr');
          
          if(cIdx === 0) {
            const td = document.createElement('td');
            td.rowSpan = cats.length;
            td.className = 'main-td';
            td.style.backgroundColor = rankInfo.name;
            td.style.setProperty('--bg', rankInfo.name);
            td.dataset.path = `ranks.${rIdx}.color`;
            td.innerHTML = `<div class="cell"><div class="info-title">${rank.rank}. ${rank.name}</div><div class="info-colors">EN: <span class="en">${rankInfo.name}</span> | RU: <span class="ru">${rankInfo.ru}</span></div></div>`;
            td.onclick = () => openModal(td.dataset.path);
            tr.appendChild(td);
          }

          const catValue = cat.color || rankValue;
          const catInfo = getColorInfo(catValue);
          const tdCat = document.createElement('td');
          tdCat.className = 'main-td';
          tdCat.style.backgroundColor = catInfo.name;
          tdCat.style.setProperty('--bg', catInfo.name);
          tdCat.dataset.path = `ranks.${rIdx}.categories.${cIdx}.color`;
          tdCat.innerHTML = `<div class="cell"><div class="info-title">${cat.id}. ${cat.name}</div><div class="info-colors">EN: <span class="en">${catInfo.name}</span> | RU: <span class="ru">${catInfo.ru}</span></div></div>`;
          tdCat.onclick = () => openModal(tdCat.dataset.path);
          tr.appendChild(tdCat);
          tbody.appendChild(tr);
        });
      });
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status-box');
      el.textContent = msg; el.className = `status ${type}`; el.style.display = 'block';
      setTimeout(()=> el.style.display='none', 2500);
    }

    document.getElementById('apply-btn').onclick = () => {
      try {
        appData = JSON.parse(document.getElementById('json-input').value);
        renderTable();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        showStatus('JSON применён и сохранён', 'success');
      } catch(e) { showStatus(`Ошибка JSON: ${e.message}`, 'error'); }
    };

    init();
  </script>
</body>
</html>
