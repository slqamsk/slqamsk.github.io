# Рамка диеты на 2500 ккал с плавным снижением жиров

## 1. Исходный запрос и вводные

**Задача:** составить «рамку» диеты для плавного снижения веса без резкого падения калорийности и с контролируемым, постепенным уменьшением доли жира в рационе.

**Исходные данные:**  
- Пол: мужской.  
- Возраст: 51 год.  
- Рост: 180 см.  
- Вес: 165 кг.  
- Текущее питание: ≈4500 ккал/день, жиры ≈300 г (примерно 200% от физиологической нормы).  
- Основной источник скрытых жиров: майонез, жарка на масле, жирные продукты.  
- Пищевые ограничения: не употребляется мясо млекопитающих.  
- Режим питания: 5 раз в день (8:00, 11:00, 14:00, 17:00, 20:00).  

**Обязательные приёмы:**  
- 8:00 — Завтрак-1: гречка, подсолнечное масло, зелень.  
- 11:00 — Завтрак-2: фрукты.  

**Целевые параметры:**  
- Стартовая калорийность: 2500 ккал.  
- Клетчатка: 50 г/день.  
- Два целевых норматива на 2500 ккал:  
  - **Норматив 1** (переходный): жиры 140% от сбалансированной нормы.  
  - **Норматив 2** (целевой, через несколько месяцев): сбалансированный (жиры 100%).  
- Плавное снижение доли жира без провалов и резких скачков.

---

## 2. Методология расчёта

### Теоретические формулы

**BMR (Basal Metabolic Rate — базальный метаболизм):** рассчитывается по формуле Миффлина-Сан Жеора (The Mifflin-St Jeor Equation), утверждённой Академией питания и диететики США как наиболее точная для большинства людей.  

Для мужчин: BMR = 10 × вес (кг) + 6.25 × рост (см) – 5 × возраст (лет) + 5.  

**TDEE (Total Daily Energy Expenditure — общие суточные затраты энергии):** TDEE = BMR × коэффициент физической активности (PAL).  

Коэффициенты физической активности (PAL): сидячий образ жизни — 1.2, лёгкая активность (прогулки, бытовая подвижность) — 1.375, умеренная активность (тренировки 2–3 раза в неделю) — 1.55, высокая активность (интенсивные тренировки) — 1.725, экстремальная активность (спортсмены) — 1.9.  

**Пересчёт граммов нутриентов в калории (коэффициенты Atwater):** белки — 4 ккал/г, жиры — 9 ккал/г, углеводы — 4 ккал/г. Клетчатка (пищевые волокна) даёт ≈2 ккал/г, но в калорийности блюд обычно не учитывается.  

**Формула расчёта калорийности продукта:** Ккал = Белки (г) × 4 + Жиры (г) × 9 + Углеводы (г) × 4.  

**Проверка процентов БЖУ от калорийности:**  
% Белка = (Белки (г) × 4 / Ккал) × 100%.  
% Жира = (Жиры (г) × 9 / Ккал) × 100%.  
% Углеводов = (Углеводы (г) × 4 / Ккал) × 100%.  

### Прикладной расчёт для данного случая

**BMR:** BMR = 10 × 165 + 6.25 × 180 – 5 × 51 + 5 = 1650 + 1125 – 255 + 5 = 2525 ккал.  

**TDEE:** принят коэффициент лёгкой активности 1.375 (прогулки, бытовая подвижность). TDEE = 2525 × 1.375 = 3472 ккал.  

**Дефицит калорий** установлен на уровне ≈1000 ккал от TDEE — темп похудения 0.8–1.0 кг в неделю без стресса для метаболизма. Калорийность диеты = 3472 – 1000 ≈ 2500 ккал.  

### Расчёт нормативов

**Норматив 2 (сбалансированный, 100% жира):** классическое распределение БЖУ — белки 20%, жиры 30%, углеводы 50% от калорийности.  
Жиры = 2500 × 0.30 / 9 = 83 г.  
Белки = 2500 × 0.20 / 4 = 125 г.  
Углеводы = 2500 × 0.50 / 4 = 313 г.  

**Норматив 1 (переходный, 140% жира):** жир = 83 г × 1.4 = 116 г = 1044 ккал (42%). Оставшиеся 58% калорий (1456 ккал) распределены между белками и углеводами пропорционально их соотношению в сбалансированном нормативе (20:50 = 1:2.5).  
Жиры = 116 г.  
Белки = (1456 × 1/3.5) / 4 = 104 г.  
Углеводы = (1456 × 2.5/3.5) / 4 = 260 г.  

### Принципы построения меню

- Приоритет простых, доступных продуктов без экзотики.  
- Исключены: майонез, жарка на масле, мясо млекопитающих.  
- Источники жиров: растительное и сливочное масло, сметана, орехи.  
- Углеводы распределены преимущественно в первой половине дня.  
- Ужин-2 подобран с учётом поддержки засыпания (триптофан, магний, мелатонин).  
- Все продукты посчитаны в готовом/свежем виде; для продуктов, меняющих вес при термообработке (капуста тушёная), КБЖУ рассчитаны по сырому весу, но в таблице указан готовый выход.  
- **Вода для варки круп и бобовых включена в итоговый вес порции.** Калорийность воды равна нулю, но её вес учтён для реалистичного объёма блюда. Пропорция воды к сухому продукту: гречка 1:2.5, овсянка 1:2, чечевица 1:2.
