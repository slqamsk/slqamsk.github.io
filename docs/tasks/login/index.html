<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Вход / Регистрация</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-container {
            max-width: 400px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }
        .tabs button {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #888;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
        }
        .tabs button.active {
            color: #6c5ce7;
            border-bottom-color: #6c5ce7;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6c5ce7;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }
        .btn-primary:hover {
            background: #5a4bd1;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        .success-box {
            text-align: center;
            padding: 20px 0;
        }
        .success-box .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .success-box .message {
            font-size: 18px;
            margin-bottom: 24px;
        }
        .hidden {
            display: none !important;
        }
        .error {
            color: #e74c3c;
            padding: 12px;
            background: #fde8e8;
            border-radius: 8px;
            margin: 8px 0;
        }
        .success-msg {
            color: #27ae60;
            padding: 12px;
            background: #e8f8ed;
            border-radius: 8px;
            margin: 8px 0;
        }
        .status-message {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="card">

        <!-- Блок входа/регистрации -->
        <div id="authForms">
            <h1>📊 Опрос студентов</h1>
            <p class="subtitle">Войдите или зарегистрируйтесь</p>

            <div class="tabs">
                <button id="tabLogin" class="active">Вход</button>
                <button id="tabRegister">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <div id="loginForm" class="tab-content active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="student@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="btn-primary" id="loginBtn">Войти</button>
                <div id="loginStatus" class="status-message"></div>
            </div>

            <!-- Форма регистрации -->
            <div id="registerForm" class="tab-content">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="student@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Полное имя (опционально)</label>
                    <input type="text" id="regFullName" placeholder="Иванов Иван Иванович">
                </div>
                <button class="btn-primary" id="registerBtn">Зарегистрироваться</button>
                <div id="regStatus" class="status-message"></div>
            </div>
        </div>

        <!-- Блок успеха (после входа/регистрации) -->
        <div id="successBlock" class="hidden">
            <div class="success-box">
                <div class="icon">✅</div>
                <div class="message" id="successMessage">Вход выполнен!</div>
                <button class="btn-primary" id="returnBtn">Вернуться</button>
            </div>
        </div>

    </div>
</div>

<script>
    // ============================================================
    // 1. НАСТРОЙКА API
    // ============================================================
    const API_BASE = 'https://feedback-collector-4hw0.onrender.com';

    // ============================================================
    // 2. РАБОТА С ТОКЕНОМ И REDIRECT
    // ============================================================
    function getToken() {
        return localStorage.getItem('jwt_token');
    }

    function setToken(token) {
        localStorage.setItem('jwt_token', token);
    }

    function removeToken() {
        localStorage.removeItem('jwt_token');
    }

    // Получаем redirect из URL
    function getRedirect() {
        const params = new URLSearchParams(window.location.search);
        return params.get('redirect');
    }

    // ============================================================
    // 3. DOM ЭЛЕМЕНТЫ
    // ============================================================
    const authForms = document.getElementById('authForms');
    const successBlock = document.getElementById('successBlock');
    const successMessage = document.getElementById('successMessage');
    const returnBtn = document.getElementById('returnBtn');

    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');

    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const loginStatus = document.getElementById('loginStatus');

    const regEmail = document.getElementById('regEmail');
    const regPassword = document.getElementById('regPassword');
    const regFullName = document.getElementById('regFullName');
    const registerBtn = document.getElementById('registerBtn');
    const regStatus = document.getElementById('regStatus');

    let redirectUrl = getRedirect();

    // ============================================================
    // 4. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // ============================================================
    function showMessage(element, text, type = 'success') {
        element.innerHTML = `<div class="${type}">${text}</div>`;
        if (type !== 'error') {
            setTimeout(() => { element.innerHTML = ''; }, 5000);
        }
    }

    function clearMessage(element) {
        element.innerHTML = '';
    }

    function showSuccess(text) {
        authForms.classList.add('hidden');
        successBlock.classList.remove('hidden');
        successMessage.textContent = text;

        // Настраиваем кнопку "Вернуться"
        if (redirectUrl) {
            returnBtn.textContent = 'Вернуться';
            returnBtn.onclick = () => {
                window.location.href = redirectUrl;
            };
        } else {
            returnBtn.textContent = 'Перейти к заданиям';
            returnBtn.onclick = () => {
                window.location.href = '/tasks/';
            };
        }
    }

    // ============================================================
    // 5. РЕГИСТРАЦИЯ
    // ============================================================
    async function registerUser() {
        const email = regEmail.value.trim();
        const password = regPassword.value.trim();
        const fullName = regFullName.value.trim();

        if (!email || !password) {
            showMessage(regStatus, 'Пожалуйста, заполните email и пароль', 'error');
            return;
        }

        registerBtn.disabled = true;
        registerBtn.textContent = 'Регистрация...';

        try {
            const response = await fetch(`${API_BASE}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, full_name: fullName || undefined })
            });
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || `HTTP ${response.status}`);
            }
            setToken(data.token);
            showSuccess('Регистрация прошла успешно!');
        } catch (err) {
            showMessage(regStatus, `❌ ${err.message}`, 'error');
        } finally {
            registerBtn.disabled = false;
            registerBtn.textContent = 'Зарегистрироваться';
        }
    }

    // ============================================================
    // 6. ВХОД
    // ============================================================
    async function loginUser() {
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();

        if (!email || !password) {
            showMessage(loginStatus, 'Пожалуйста, заполните email и пароль', 'error');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = 'Вход...';

        try {
            const response = await fetch(`${API_BASE}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || `HTTP ${response.status}`);
            }
            setToken(data.token);
            showSuccess('Вход выполнен!');
        } catch (err) {
            showMessage(loginStatus, `❌ ${err.message}`, 'error');
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Войти';
        }
    }

    // ============================================================
    // 7. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
    // ============================================================
    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
        if (tab === 'login') {
            loginForm.classList.add('active');
            tabLogin.classList.add('active');
        } else {
            registerForm.classList.add('active');
            tabRegister.classList.add('active');
        }
        clearMessage(loginStatus);
        clearMessage(regStatus);
    }

    // ============================================================
    // 8. ИНИЦИАЛИЗАЦИЯ
    // ============================================================
    function init() {
        // Если уже есть токен, сразу показываем успех (пользователь уже авторизован)
        if (getToken()) {
            showSuccess('Вы уже авторизованы.');
            return;
        }

        // Обработчики вкладок
        tabLogin.addEventListener('click', () => switchTab('login'));
        tabRegister.addEventListener('click', () => switchTab('register'));

        // Обработчики форм
        loginBtn.addEventListener('click', loginUser);
        registerBtn.addEventListener('click', registerUser);

        // Enter
        loginEmail.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginUser(); });
        loginPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginUser(); });
        regEmail.addEventListener('keypress', (e) => { if (e.key === 'Enter') registerUser(); });
        regPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') registerUser(); });
        regFullName.addEventListener('keypress', (e) => { if (e.key === 'Enter') registerUser(); });

        console.log('✅ Страница логина запущена');
        if (redirectUrl) {
            console.log(`↩️ После входа вернёмся на: ${redirectUrl}`);
        }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
