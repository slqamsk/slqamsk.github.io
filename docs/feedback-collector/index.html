<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Опрос студентов</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }
        .tabs button {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #888;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
        }
        .tabs button.active {
            color: #6c5ce7;
            border-bottom-color: #6c5ce7;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6c5ce7;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }
        .btn-primary:hover {
            background: #5a4bd1;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .course-btn {
            display: block;
            width: 100%;
            padding: 12px 16px;
            margin: 6px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }
        .course-btn:hover {
            border-color: #6c5ce7;
            background: #f8f7ff;
        }
        .course-btn.active {
            border-color: #6cce7;
            background: #6c5ce7;
            color: white;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }
        textarea:focus {
            outline: none;
            border-color: #6c5ce7;
        }
        .answer-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .answer-item .course-tag {
            display: inline-block;
            background: #6c5ce7;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 4px;
        }
        .answer-item .date {
            color: #888;
            font-size: 12px;
        }
        .hidden {
            display: none !important;
        }
        .error {
            color: #e74c3c;
            padding: 12px;
            background: #fde8e8;
            border-radius: 8px;
            margin: 8px 0;
        }
        .success {
            color: #27ae60;
            padding: 12px;
            background: #e8f8ed;
            border-radius: 8px;
            margin: 8px 0;
        }
        .loader {
            text-align: center;
            color: #888;
            padding: 20px;
        }
        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
        }
        .user-info .name {
            font-weight: 600;
        }
        .user-info .id {
            color: #888;
            font-size: 12px;
        }
        .status-message {
            margin-top: 10px;
        }
        .auth-container {
            max-width: 400px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- БЛОК АВТОРИЗАЦИИ (показывается, если нет токена)              -->
    <!-- ============================================================ -->
    <div id="authContainer" class="auth-container">
        <div class="card">
            <h1>📊 Опрос студентов</h1>
            <p class="subtitle">Войдите или зарегистрируйтесь</p>

            <!-- Вкладки -->
            <div class="tabs">
                <button id="tabLogin" class="active">Вход</button>
                <button id="tabRegister">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <div id="loginForm" class="tab-content active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="student@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="btn-primary" id="loginBtn">Войти</button>
                <div id="loginStatus" class="status-message"></div>
            </div>

            <!-- Форма регистрации -->
            <div id="registerForm" class="tab-content">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="student@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Полное имя (опционально)</label>
                    <input type="text" id="regFullName" placeholder="Иванов Иван Иванович">
                </div>
                <button class="btn-primary" id="registerBtn">Зарегистрироваться</button>
                <div id="regStatus" class="status-message"></div>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ (показывается после авторизации)          -->
    <!-- ============================================================ -->
    <div id="appContainer" class="hidden">
        <div class="card">
            <div class="user-info">
                <span class="name" id="userName">—</span>
                <button class="btn-danger" id="logoutBtn">Выйти</button>
            </div>
        </div>

        <!-- Курсы -->
        <div class="card">
            <h3>📚 Выберите курс</h3>
            <div id="coursesList">
                <div class="loader">Загрузка курсов...</div>
            </div>
            <div id="courseStatus" class="status-message"></div>
        </div>

        <!-- Отправка ответа -->
        <div class="card">
            <h3>✏️ Ваш ответ</h3>
            <textarea id="answerInput" placeholder="Напишите ваш ответ здесь..."></textarea>
            <button class="btn-primary" id="sendAnswerBtn">Отправить ответ</button>
            <div id="answerStatus" class="status-message"></div>
        </div>

        <!-- Мои ответы -->
        <div class="card">
            <h3>📋 Мои ответы</h3>
            <button class="btn-secondary" id="loadAnswersBtn">Обновить</button>
            <div id="answersList" style="margin-top:12px;">
                <div class="loader">Загрузите ответы</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. НАСТРОЙКА API
        // ============================================================
        const API_BASE = 'https://feedback-collector-4hw0.onrender.com';

        // ============================================================
        // 2. РАБОТА С ТОКЕНОМ
        // ============================================================
        function getToken() {
            return localStorage.getItem('jwt_token');
        }

        function setToken(token) {
            localStorage.setItem('jwt_token', token);
        }

        function removeToken() {
            localStorage.removeItem('jwt_token');
        }

        function getAuthHeaders() {
            const token = getToken();
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        // ============================================================
        // 3. DOM ЭЛЕМЕНТЫ
        // ============================================================
        const authContainer = document.getElementById('authContainer');
        const appContainer = document.getElementById('appContainer');
        const userName = document.getElementById('userName');

        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');

        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const loginStatus = document.getElementById('loginStatus');

        const regEmail = document.getElementById('regEmail');
        const regPassword = document.getElementById('regPassword');
        const regFullName = document.getElementById('regFullName');
        const registerBtn = document.getElementById('registerBtn');
        const regStatus = document.getElementById('regStatus');

        const coursesList = document.getElementById('coursesList');
        const courseStatus = document.getElementById('courseStatus');
        const answerInput = document.getElementById('answerInput');
        const sendAnswerBtn = document.getElementById('sendAnswerBtn');
        const answerStatus = document.getElementById('answerStatus');
        const answersList = document.getElementById('answersList');
        const loadAnswersBtn = document.getElementById('loadAnswersBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        let currentStudent = null;
        let selectedCourseId = null;
        let allCourses = [];

        // ============================================================
        // 4. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function showMessage(element, text, type = 'success') {
            element.innerHTML = `<div class="${type}">${text}</div>`;
            if (type !== 'error') {
                setTimeout(() => { element.innerHTML = ''; }, 5000);
            }
        }

        function clearMessage(element) {
            element.innerHTML = '';
        }

        function toggleAuth(show) {
            if (show) {
                authContainer.classList.remove('hidden');
                appContainer.classList.add('hidden');
            } else {
                authContainer.classList.add('hidden');
                appContainer.classList.remove('hidden');
            }
        }

        // ============================================================
        // 5. ЗАГРУЗКА КУРСОВ
        // ============================================================
        async function loadCourses() {
            try {
                const response = await fetch(`${API_BASE}/api/courses`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                allCourses = await response.json();
                renderCourses();
            } catch (err) {
                coursesList.innerHTML = `<div class="error">Ошибка загрузки курсов: ${err.message}</div>`;
            }
        }

        function renderCourses() {
            if (!allCourses.length) {
                coursesList.innerHTML = '<div class="error">Курсов пока нет</div>';
                return;
            }
            let html = '';
            allCourses.forEach(course => {
                const active = course.id === selectedCourseId ? 'active' : '';
                html += `
                    <button class="course-btn ${active}" data-course-id="${course.id}">
                        ${course.name}
                    </button>
                `;
            });
            coursesList.innerHTML = html;
            document.querySelectorAll('.course-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const courseId = parseInt(btn.dataset.courseId);
                    await selectCourse(courseId);
                });
            });
        }

        // ============================================================
        // 6. ВЫБОР КУРСА (защищённый)
        // ============================================================
        async function selectCourse(courseId) {
            if (!currentStudent) {
                showMessage(courseStatus, 'Сначала авторизуйтесь!', 'error');
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/api/student/select_course`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders()
                    },
                    body: JSON.stringify({ course_id: courseId })
                });
                if (!response.ok) {
                    if (response.status === 401) {
                        handleUnauthorized();
                        return;
                    }
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                selectedCourseId = courseId;
                currentStudent.selected_course_id = courseId;
                renderCourses();
                showMessage(courseStatus, `✅ Выбран курс: ${allCourses.find(c => c.id === courseId)?.name}`, 'success');
            } catch (err) {
                showMessage(courseStatus, `❌ Ошибка: ${err.message}`, 'error');
            }
        }

        // ============================================================
        // 7. РЕГИСТРАЦИЯ
        // ============================================================
        async function registerUser() {
            const email = regEmail.value.trim();
            const password = regPassword.value.trim();
            const fullName = regFullName.value.trim();

            if (!email || !password) {
                showMessage(regStatus, 'Пожалуйста, заполните email и пароль', 'error');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Регистрация...';

            try {
                const response = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name: fullName || undefined })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }
                // Успешная регистрация — сразу логинимся
                setToken(data.token);
                currentStudent = data.student;
                selectedCourseId = currentStudent.selected_course_id || null;
                showMessage(regStatus, '✅ Регистрация успешна!', 'success');
                await enterApp();
            } catch (err) {
                showMessage(regStatus, `❌ ${err.message}`, 'error');
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
            }
        }

        // ============================================================
        // 8. ВХОД
        // ============================================================
        async function loginUser() {
            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();

            if (!email || !password) {
                showMessage(loginStatus, 'Пожалуйста, заполните email и пароль', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Вход...';

            try {
                const response = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }
                setToken(data.token);
                currentStudent = data.student;
                selectedCourseId = currentStudent.selected_course_id || null;
                showMessage(loginStatus, '✅ Вход выполнен!', 'success');
                await enterApp();
            } catch (err) {
                showMessage(loginStatus, `❌ ${err.message}`, 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Войти';
            }
        }

        // ============================================================
        // 9. ВХОД В ПРИЛОЖЕНИЕ
        // ============================================================
        async function enterApp() {
            toggleAuth(false);
            userName.textContent = currentStudent.full_name || 'Студент';
            if (selectedCourseId) {
                renderCourses();
                const courseName = allCourses.find(c => c.id === selectedCourseId)?.name || 'выбранный курс';
                showMessage(courseStatus, `ℹ️ Использую последний курс: ${courseName}`, 'success');
            }
            await loadAnswers();
        }

        // ============================================================
        // 10. ПРОВЕРКА ТОКЕНА ПРИ ЗАГРУЗКЕ
        // ============================================================
        async function checkAuth() {
            const token = getToken();
            if (!token) {
                toggleAuth(true);
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/api/student/me`, {
                    headers: getAuthHeaders()
                });
                if (!response.ok) {
                    if (response.status === 401) {
                        handleUnauthorized();
                    } else {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return;
                }
                currentStudent = await response.json();
                selectedCourseId = currentStudent.selected_course_id || null;
                await enterApp();
            } catch (err) {
                console.error('Ошибка проверки токена:', err);
                handleUnauthorized();
            }
        }

        function handleUnauthorized() {
            removeToken();
            currentStudent = null;
            selectedCourseId = null;
            toggleAuth(true);
            showMessage(loginStatus, 'Сессия истекла. Войдите снова.', 'error');
        }

        // ============================================================
        // 11. ОТПРАВКА ОТВЕТА (защищённый)
        // ============================================================
        async function sendAnswer() {
            const content = answerInput.value.trim();
            if (!content) {
                showMessage(answerStatus, 'Пожалуйста, напишите ответ', 'error');
                return;
            }
            if (!currentStudent) {
                showMessage(answerStatus, 'Сначала авторизуйтесь!', 'error');
                return;
            }
            let courseId = selectedCourseId || currentStudent.selected_course_id;
            if (!courseId) {
                showMessage(answerStatus, 'Пожалуйста, выберите курс', 'error');
                return;
            }

            sendAnswerBtn.disabled = true;
            sendAnswerBtn.textContent = 'Отправка...';

            try {
                const response = await fetch(`${API_BASE}/api/answers`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...getAuthHeaders()
                    },
                    body: JSON.stringify({
                        course_id: courseId,
                        content: content
                    })
                });
                if (!response.ok) {
                    if (response.status === 401) {
                        handleUnauthorized();
                        return;
                    }
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                showMessage(answerStatus, '✅ Ответ сохранён!', 'success');
                answerInput.value = '';
                await loadAnswers();
            } catch (err) {
                showMessage(answerStatus, `❌ ${err.message}`, 'error');
            } finally {
                sendAnswerBtn.disabled = false;
                sendAnswerBtn.textContent = 'Отправить ответ';
            }
        }

        // ============================================================
        // 12. ЗАГРУЗКА ОТВЕТОВ (защищённый)
        // ============================================================
        async function loadAnswers() {
            if (!currentStudent) {
                answersList.innerHTML = '<div class="loader">Авторизуйтесь, чтобы увидеть ответы</div>';
                return;
            }
            answersList.innerHTML = '<div class="loader">Загрузка...</div>';
            try {
                const response = await fetch(`${API_BASE}/api/answers`, {
                    headers: getAuthHeaders()
                });
                if (!response.ok) {
                    if (response.status === 401) {
                        handleUnauthorized();
                        return;
                    }
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                const data = await response.json();
                if (!data || data.length === 0) {
                    answersList.innerHTML = '<div class="loader">📭 У вас пока нет ответов</div>';
                    return;
                }
                let html = '';
                data.forEach(ans => {
                    const courseName = ans.courses?.name || 'Без курса';
                    const date = new Date(ans.created_at).toLocaleString('ru-RU');
                    const content = ans.content.length > 100 ? ans.content.slice(0, 100) + '...' : ans.content;
                    html += `
                        <div class="answer-item">
                            <div class="course-tag">${courseName}</div>
                            <div>${content}</div>
                            <div class="date">${date}</div>
                        </div>
                    `;
                });
                answersList.innerHTML = html;
            } catch (err) {
                answersList.innerHTML = `<div class="error">Ошибка: ${err.message}</div>`;
            }
        }

        // ============================================================
        // 13. ВЫХОД
        // ============================================================
        function logout() {
            removeToken();
            currentStudent = null;
            selectedCourseId = null;
            toggleAuth(true);
            answerInput.value = '';
            answersList.innerHTML = '<div class="loader">Загрузите ответы</div>';
            coursesList.innerHTML = '<div class="loader">Загрузка курсов...</div>';
            showMessage(loginStatus, 'Вы вышли из системы.', 'success');
            // Очищаем поля форм
            loginEmail.value = '';
            loginPassword.value = '';
            regEmail.value = '';
            regPassword.value = '';
            regFullName.value = '';
        }

        // ============================================================
        // 14. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        // ============================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
            if (tab === 'login') {
                loginForm.classList.add('active');
                tabLogin.classList.add('active');
            } else {
                registerForm.classList.add('active');
                tabRegister.classList.add('active');
            }
            // Очищаем сообщения
            clearMessage(loginStatus);
            clearMessage(regStatus);
        }

        // ============================================================
        // 15. ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        async function init() {
            // Обработчики вкладок
            tabLogin.addEventListener('click', () => switchTab('login'));
            tabRegister.addEventListener('click', () => switchTab('register'));

            // Обработчики форм
            loginBtn.addEventListener('click', loginUser);
            registerBtn.addEventListener('click', registerUser);
            sendAnswerBtn.addEventListener('click', sendAnswer);
            loadAnswersBtn.addEventListener('click', loadAnswers);
            logoutBtn.addEventListener('click', logout);

            // Enter в полях
            loginEmail.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginUser(); });
            loginPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginUser(); });
            regEmail.addEventListener('keypress', (e) => { if (e.key === 'Enter') registerUser(); });
            regPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') registerUser(); });
            regFullName.addEventListener('keypress', (e) => { if (e.key === 'Enter') registerUser(); });
            answerInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendAnswer();
                }
            });

            // Загружаем курсы (всегда, они публичные)
            await loadCourses();

            // Проверяем авторизацию
            await checkAuth();

            console.log('✅ Веб-версия опросника запущена!');
            console.log(`🔗 API: ${API_BASE}`);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
